name: Signed Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
  SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
  SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
  SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
  VIBE_HALO_PUBLISHER_NAME: ${{ vars.SIGNPATH_PUBLISHER_NAME }}

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate release inputs
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN_CHECK: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $version"
          }
          git fetch origin main --no-tags
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) { throw "Release tag must point to a commit on main" }
          $required = @(
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_ARTIFACT_CONFIGURATION_SLUG",
            "VIBE_HALO_PUBLISHER_NAME"
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing repository variable: $name"
            }
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_API_TOKEN_CHECK)) {
            throw "Missing repository secret: SIGNPATH_API_TOKEN"
          }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build unpacked application
        run: npm run build:dir

      - name: Stage NSIS signing dependencies
        shell: pwsh
        env:
          VIBE_HALO_EXTERNAL_SIGNING: "1"
          VIBE_HALO_SIGN_STAGE_DIR: ${{ github.workspace }}\dist\sign-stage
        run: |
          npm run build:prepackaged
          New-Item -ItemType Directory -Path "dist/sign-stage/app" -Force | Out-Null
          Copy-Item -LiteralPath "dist/win-unpacked/Vibe Halo.exe" -Destination "dist/sign-stage/app/Vibe Halo.exe" -Force
          Copy-Item -LiteralPath "dist/sign-stage/elevate.exe" -Destination "dist/sign-stage/app/elevate.exe" -Force

      - name: Upload unsigned application executables
        id: upload-app
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-vibe-halo-app
          path: dist/sign-stage/app/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign application executables
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-app.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}/dist/signed-app

      - name: Inject signed application executable
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "dist/signed-app/Vibe Halo.exe" -Destination "dist/win-unpacked/Vibe Halo.exe" -Force
          Copy-Item -LiteralPath "dist/signed-app/elevate.exe" -Destination "dist/win-unpacked/resources/elevate.exe" -Force
          node scripts/write-app-update-config.js "dist/win-unpacked" $env:VIBE_HALO_PUBLISHER_NAME

      - name: Stage generated uninstaller
        shell: pwsh
        env:
          VIBE_HALO_EXTERNAL_SIGNING: "1"
          VIBE_HALO_SIGN_STAGE_DIR: ${{ github.workspace }}\dist\sign-stage
          VIBE_HALO_SIGNED_ELEVATE: ${{ github.workspace }}\dist\signed-app\elevate.exe
        run: npm run build:prepackaged

      - name: Upload unsigned uninstaller
        id: upload-uninstaller
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-vibe-halo-uninstaller
          path: dist/sign-stage/uninstaller.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign uninstaller
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-uninstaller.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}/dist/signed-uninstaller

      - name: Build installer with signed uninstaller
        shell: pwsh
        env:
          VIBE_HALO_EXTERNAL_SIGNING: "1"
          VIBE_HALO_SIGN_STAGE_DIR: ${{ github.workspace }}\dist\sign-stage
          VIBE_HALO_SIGNED_ELEVATE: ${{ github.workspace }}\dist\signed-app\elevate.exe
          VIBE_HALO_SIGNED_UNINSTALLER: ${{ github.workspace }}\dist\signed-uninstaller\uninstaller.exe
        run: npm run build:prepackaged

      - name: Upload unsigned installer
        id: upload-installer
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-vibe-halo-installer
          path: dist/sign-stage/installer.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign installer
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}/dist/signed-installer

      - name: Generate signed update metadata
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $installer = "dist/Vibe-Halo-Setup-$version-x64.exe"
          Copy-Item -LiteralPath "dist/signed-installer/installer.exe" -Destination $installer -Force
          $env:VIBE_HALO_RELEASE_DATE = git show -s --format=%cI $env:GITHUB_SHA
          node scripts/generate-update-metadata.js --installer $installer --version $version --out-dir dist

      - name: Verify signed package
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $installer = Resolve-Path "dist/Vibe-Halo-Setup-$version-x64.exe"
          function Assert-Signature([string] $file) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file
            if ($signature.Status -ne "Valid") { throw "Invalid Authenticode signature: $file ($($signature.Status))" }
            $publisher = $signature.SignerCertificate.Subject
            if ($publisher -ne $env:VIBE_HALO_PUBLISHER_NAME) {
              throw "Unexpected publisher for $file: $publisher"
            }
          }
          Assert-Signature "dist/win-unpacked/Vibe Halo.exe"
          Assert-Signature "dist/win-unpacked/resources/elevate.exe"
          Assert-Signature "dist/signed-uninstaller/uninstaller.exe"
          Assert-Signature $installer
          node -e "const asar=require('@electron/asar'); const p=JSON.parse(asar.extractFile('dist/win-unpacked/resources/app.asar','package.json')); if(p.version!=='$version'||p.autoUpdateEnabled!==true) process.exit(1)"
          $updateConfig = Get-Content "dist/win-unpacked/resources/app-update.yml" -Raw
          if ($updateConfig -notmatch [regex]::Escape($env:VIBE_HALO_PUBLISHER_NAME)) { throw "Publisher is missing from app-update.yml" }
          $asarList = node node_modules/@electron/asar/bin/asar.js list "dist/win-unpacked/resources/app.asar"
          if ($asarList -notcontains "\LICENSE" -or $asarList -notcontains "\NOTICE.md") { throw "LICENSE or NOTICE.md is missing from app.asar" }
          $installDir = Join-Path $env:RUNNER_TEMP "vibe-halo-release-install"
          $process = Start-Process -FilePath $installer -ArgumentList @("/S", "/D=$installDir") -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Silent installer failed with $($process.ExitCode)" }
          Assert-Signature (Join-Path $installDir "Vibe Halo.exe")
          Assert-Signature (Join-Path $installDir "resources/elevate.exe")
          $uninstaller = Join-Path $installDir "Uninstall Vibe Halo.exe"
          if (-not (Test-Path $uninstaller)) { throw "Installed uninstaller is missing" }
          Assert-Signature $uninstaller
          $installedUpdateConfig = Join-Path $installDir "resources/app-update.yml"
          if (-not (Test-Path $installedUpdateConfig)) { throw "Installed app-update.yml is missing" }
          Start-Process -FilePath $uninstaller -ArgumentList "/S" -Wait

      - name: Publish draft release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $installer = "dist/Vibe-Halo-Setup-$version-x64.exe"
          $assets = @(
            $installer,
            "$installer.blockmap",
            "dist/latest.yml",
            "dist/SHA256SUMS.txt",
            "LICENSE",
            "NOTICE.md"
          )
          gh release create $env:GITHUB_REF_NAME $assets --draft --verify-tag --title "Vibe Halo $version" --generate-notes
          gh release edit $env:GITHUB_REF_NAME --draft=false --latest
